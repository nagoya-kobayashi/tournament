<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14251f" />
    <title>Indoor Matchboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#live" aria-label="Indoor Matchboard ホーム">
          <span class="brand-mark" aria-hidden="true">IM</span>
          <span>
            <strong id="event-title">インドア選手権</strong>
            <small>Indoor Matchboard</small>
          </span>
        </a>
        <div class="topbar-actions">
          <span id="sync-status" class="sync-pill local"><i></i>この端末に保存</span>
          <button id="open-settings" class="icon-button" type="button" aria-label="共有設定" title="共有設定">⚙</button>
          <button id="menu-button" class="icon-button menu-button" type="button" aria-label="メニューを開く">☰</button>
        </div>
      </header>

      <aside id="sidebar" class="sidebar">
        <nav aria-label="メインメニュー">
          <a href="#live" data-route="live"><span>●</span>ライブ</a>
          <a href="#class-schedule" data-route="class-schedule"><span>▦</span>クラス別予定</a>
          <a href="#competition-schedule" data-route="competition-schedule"><span>▤</span>競技別予定</a>
          <p>大会準備</p>
          <a href="#competitions" data-route="competitions"><span>◇</span>競技設定</a>
          <a href="#entries" data-route="entries"><span>＋</span>エントリー</a>
          <a href="#draw" data-route="draw"><span>⑂</span>組み合わせ</a>
          <a href="#schedule" data-route="schedule"><span>◷</span>試合日程</a>
        </nav>
        <div class="sidebar-note">
          <strong>運営モード</strong>
          <span>結果入力と設定変更ができます</span>
        </div>
      </aside>

      <main id="app" class="main-content" tabindex="-1"></main>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="js/initial-data.js"></script>
    <script src="js/model.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
