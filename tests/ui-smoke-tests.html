<!doctype html>
<meta charset="utf-8">
<title>Matchboard UI smoke tests</title>
<style>body{font:14px system-ui;padding:16px}iframe{width:1200px;height:720px;border:1px solid #ccc}.pass{color:#17633d}.fail{color:#a32d25}</style>
<h1>Matchboard UI smoke tests</h1>
<pre id="results">RUNNING</pre>
<iframe id="frame"></iframe>
<script src="../js/model.js"></script>
<script src="../js/store.js"></script>
<script>
  window.addEventListener("unhandledrejection", (event) => {
    const result = document.getElementById("results");
    result.className = "fail";
    result.textContent = `UNHANDLED: ${event.reason && (event.reason.stack || event.reason.message) || event.reason}`;
    document.body.dataset.failures = "1";
    document.title = "UI TESTS FAILED";
  });
  (async function () {
    const M = window.MatchboardModel;
    const state = M.createInitialState();
    state.competitions.forEach((competition, competitionIndex) => {
      competition.slots.forEach((slot, slotIndex) => { slot.dayLabel = slotIndex < Math.ceil(competition.slots.length / 2) ? "1日目" : "2日目"; });
      state.classes.forEach((classInfo, classIndex) => {
        const entryLimit = competitionIndex === 0 ? 5 : (competitionIndex === 1 ? 6 : 4);
        state.entries[competition.id][classInfo.id] = classIndex < entryLimit ? 1 : 0;
      });
      state.draws[competition.id] = M.createDraw(state, competition.id, { groupCount: competition.format === "hybrid" ? 2 : 1 });
      if (competitionIndex === 0 && state.draws[competition.id].tournament) state.draws[competition.id].tournament.consolation = true;
    });
    const liveCompetition = state.competitions[0];
    const liveMatches = M.buildMatches(state, liveCompetition.id).filter((match) => match.phase === "tournament");
    const tracedOpeningMatch = liveMatches.find((match) => match.round === 0 && M.isPlayableMatch(state, match));
    state.results[tracedOpeningMatch.id] = { winnerSide: "a", scoreA: "1", scoreB: "0", updatedAt: new Date().toISOString() };
    const tracedLosingMatch = liveMatches.find((match) => match.round === 1 && [match.sourceA, match.sourceB].some((source) => source && source.matchId === tracedOpeningMatch.id));
    const tracedOpeningSide = tracedLosingMatch.sourceA.matchId === tracedOpeningMatch.id ? "a" : "b";
    state.results[tracedLosingMatch.id] = { winnerSide: tracedOpeningSide === "a" ? "b" : "a", scoreA: tracedOpeningSide === "a" ? "0" : "1", scoreB: tracedOpeningSide === "b" ? "0" : "1", updatedAt: new Date().toISOString() };
    state.schedule = M.autoSchedule(state, {}).schedule;
    localStorage.setItem("indoor-matchboard-state-v2", JSON.stringify(state));
    localStorage.removeItem("indoor-matchboard-sync-v1");
    localStorage.removeItem("indoor-matchboard-view-prefs-v1");

    const output = []; let failures = 0;
    function assert(condition, name) {
      if (condition) output.push(`PASS: ${name}`);
      else { failures += 1; output.push(`FAIL: ${name}`); }
      document.getElementById("results").textContent = `RUNNING (${output.length})\n\n${output.join("\n")}`;
    }
    const StoreUtils = window.MatchboardStoreUtils;
    const gasEndpoint = "https://script.google.com/macros/s/test-deployment-id/exec";
    const distributed = StoreUtils.distributionUrl(gasEndpoint, "https://example.test/matchboard/index.html?source=school#draw");
    const distributedUrl = new URL(distributed);
    assert(StoreUtils.normalizeGasEndpoint(gasEndpoint) === gasEndpoint && StoreUtils.normalizeGasEndpoint("https://example.test/exec") === "", "GASウェブアプリURLだけを受け付ける");
    assert(distributedUrl.searchParams.get("gas") === gasEndpoint && distributedUrl.searchParams.get("source") === "school" && distributedUrl.hash === "#live", "既存URLへGAS接続先を埋め込んだ配布URLを生成");
    assert(StoreUtils.embeddedEndpoint(distributed) === gasEndpoint, "配布URLからGAS接続先を復元");
    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const frame = document.getElementById("frame");
    frame.src = "../index.html?result-cancel=1#live";
    await new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
    await wait(300);
    let doc = frame.contentDocument;
    assert(doc.querySelector("h1") && doc.querySelector("h1").textContent === "ライブ", "ライブ画面を表示");
    assert(doc.querySelectorAll(".bracket-match").length > 0, "トーナメント表を描画");
    assert(doc.querySelector(".left-branch") && doc.querySelector(".bracket-center") && doc.querySelector(".right-branch"), "PDF型の左右対称トーナメントを描画");
    assert(doc.querySelector(".bracket-paper-title")?.textContent === "オセロトーナメント" && doc.querySelector('.opening-match[style*="--match-y"]') && doc.querySelector('.center-match[style*="--match-y"]'), "原本PDF準拠のタイトルと座標配置を描画");
    const seedMatch = doc.querySelector(".bracket-seed");
    const openingMatch = doc.querySelector(".opening-match:not(.bracket-seed)");
    const progressionMatch = doc.querySelector(".progression-match");
    const seedExtraWidth = seedMatch && openingMatch ? seedMatch.getBoundingClientRect().width - openingMatch.getBoundingClientRect().width : 0;
    assert(seedMatch && openingMatch && progressionMatch && Math.abs(seedExtraWidth - progressionMatch.getBoundingClientRect().width) < 2, "初戦1段・シード2段・後続1段の幅比率で描画");
    const stoppedHorizontal = doc.querySelector(`.connector-horizontal[data-source-match="${tracedOpeningMatch.id}"]`);
    const stoppedVertical = doc.querySelector(`.connector-vertical[data-source-match="${tracedOpeningMatch.id}"]`);
    assert(stoppedHorizontal?.classList.contains("advanced") && !stoppedVertical?.classList.contains("advanced"), "途中敗退の赤線を敗戦直前の折れ曲がりで停止");
    assert(doc.querySelector(".connector-vertical.advanced") && doc.querySelectorAll(".bracket-team.eliminated").length >= 2, "勝者側の縦線を赤くし敗退チーム名をグレー表示");
    assert(doc.querySelector(".seed-team.advanced") && doc.querySelector(".seed-team:not(.advanced)"), "シード線は実試合に勝ったチームだけ赤く表示");
    const smallConsolationMatches = [...doc.querySelectorAll(".consolation-match")];
    assert(smallConsolationMatches.length === 1 && smallConsolationMatches[0].querySelectorAll(".consolation-source").length === 2, "敗者2枠からコンソレーション試合を描画");
    const smallConsolationBranch = doc.querySelector(".consolation-branch");
    const smallRightmostMain = Math.max(...[...doc.querySelectorAll(".right-branch")].map((node) => node.getBoundingClientRect().right));
    assert(smallConsolationBranch && smallConsolationBranch.getBoundingClientRect().left > smallRightmostMain, "コンソレーションをPDFどおり本戦の右側へ配置");
    const smallConsolationButton = doc.querySelector("button.consolation-number");
    if (smallConsolationButton) smallConsolationButton.click();
    await wait(40);
    assert(smallConsolationButton && doc.querySelector("#result-form"), "かな試合番号からコンソレーション結果入力を表示");
    if (doc.querySelector("#result-form")) doc.querySelector("[data-close-modal]").click();
    const completedState = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    const unresolvedWinnerState = JSON.parse(JSON.stringify(completedState));
    delete unresolvedWinnerState.results[tracedOpeningMatch.id];
    unresolvedWinnerState.results[tracedLosingMatch.id] = { winnerSide: tracedOpeningSide, scoreA: "", scoreB: "", updatedAt: new Date().toISOString() };
    const unresolvedParticipants = M.participantsForMatch(unresolvedWinnerState, tracedLosingMatch);
    const knownLosingSide = tracedOpeningSide === "a" ? "b" : "a";
    const eliminatedTeam = unresolvedParticipants[knownLosingSide].team;
    const eliminatedFutureMatch = liveMatches.find((match) => match.round === tracedLosingMatch.round + 1 && [match.sourceA, match.sourceB].some((source) => source && source.matchId === tracedLosingMatch.id));
    localStorage.setItem("indoor-matchboard-state-v2", JSON.stringify(unresolvedWinnerState));
    const unresolvedReloaded = new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
    frame.contentWindow.location.reload();
    await unresolvedReloaded; await wait(300); doc = frame.contentDocument;
    frame.contentWindow.location.hash = "class-schedule"; await wait(150);
    const eliminatedClassFilter = doc.querySelector("[data-class-filter]");
    eliminatedClassFilter.value = eliminatedTeam.classId;
    eliminatedClassFilter.dispatchEvent(new Event("change", { bubbles: true })); await wait(50);
    doc.querySelector("[data-toggle-possible]").click(); await wait(50);
    assert(eliminatedFutureMatch && !doc.querySelector(`[data-result-match="${eliminatedFutureMatch.id}"]`), "相手クラスが未定でも可能性のなくなった仮予定をクラス別予定から除外");
    doc.querySelector("[data-toggle-possible]").click();
    const stateAfterCancel = completedState;
    delete stateAfterCancel.results[tracedLosingMatch.id];
    localStorage.setItem("indoor-matchboard-state-v2", JSON.stringify(stateAfterCancel));
    const reloaded = new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
    frame.src = "../index.html#live";
    await reloaded; await wait(300); doc = frame.contentDocument;
    assert(!doc.querySelector(`.connector-vertical.advanced[data-target-match="${tracedLosingMatch.id}"]`) && doc.querySelectorAll(".bracket-team.eliminated").length === 1, "結果取消に合わせて赤線と敗退表示を復元");
    assert(doc.querySelector('[data-bracket-zoom="fit"]') && doc.querySelector('[data-bracket-zoom="detail"]'), "全体・拡大表示の切替を表示");
    doc.querySelector(".match-number").click();
    await wait(50);
    assert(doc.querySelector("#result-form"), "試合番号から結果入力を表示");
    doc.querySelector("[data-close-modal]").click();

    frame.contentWindow.location.hash = "schedule"; await wait(150);
    assert(doc.querySelector("h1").textContent === "試合日程", "試合日程画面へ遷移");
    assert(doc.querySelector(".schedule-editor-split") && doc.querySelector(".schedule-reference-card .pdf-bracket") && doc.querySelectorAll("[data-schedule-cell]").length > 0, "トーナメント表と時刻×会場表を分割表示");
    assert([...doc.querySelectorAll("[data-schedule-cell] option")].some((option) => option.textContent === "あ"), "試合日程表でかな番号を配置可能");
    assert(doc.querySelector(".stage-lock-notice"), "勝敗入力後の試合日程をロック表示");
    const scheduleStateBeforeSwap = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    const swappableCells = [...doc.querySelectorAll("[data-schedule-cell]")].filter((select) => select.value && !scheduleStateBeforeSwap.results[select.value]);
    const firstScheduleCell = swappableCells[0]; const secondScheduleCell = swappableCells.find((select) => select.value !== firstScheduleCell.value);
    const firstScheduledMatch = firstScheduleCell.value; const secondScheduledMatch = secondScheduleCell.value;
    firstScheduleCell.value = secondScheduledMatch;
    firstScheduleCell.dispatchEvent(new Event("change", { bubbles: true })); await wait(80);
    const scheduleStateAfterSwap = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    assert(scheduleStateAfterSwap.schedule[secondScheduledMatch].slotId === firstScheduleCell.dataset.slotId && scheduleStateAfterSwap.schedule[secondScheduledMatch].venueId === firstScheduleCell.dataset.venueId && scheduleStateAfterSwap.schedule[firstScheduledMatch].slotId === secondScheduleCell.dataset.slotId && scheduleStateAfterSwap.schedule[firstScheduledMatch].venueId === secondScheduleCell.dataset.venueId, "日程表で試合番号を入れ替え");

    frame.contentWindow.location.hash = "draw"; await wait(150);
    assert(doc.querySelector("h1").textContent === "組み合わせ", "組み合わせ画面へ遷移");
    assert(doc.querySelector(".draw-bracket-editor .pdf-bracket") && doc.querySelectorAll(".bracket-edit-team select[data-draw-source]").length > 0, "トーナメント表上に出場枠のプルダウンを表示");
    assert(doc.querySelector(".stage-lock-notice"), "日程作成後の組み合わせをロック表示");

    frame.contentWindow.location.hash = "class-schedule"; await wait(150);
    assert(doc.querySelector("h1").textContent === "クラス別予定", "クラス別予定画面へ遷移");
    const classDayToggles = [...doc.querySelectorAll("[data-schedule-day-toggle]")];
    assert(classDayToggles.length === 2 && classDayToggles.every((button) => button.getAttribute("aria-expanded") === "false"), "1日目・2日目をデフォルトで閉じて表示");
    assert(doc.querySelector("[data-toggle-possible]") && !doc.querySelector(".possible-event"), "進出時の予定をデフォルトで非表示");
    classDayToggles[0].click(); await wait(30);
    assert(classDayToggles[0].getAttribute("aria-expanded") === "true" && !doc.getElementById(classDayToggles[0].getAttribute("aria-controls")).hidden, "日別予定を開閉");
    doc.querySelector("[data-toggle-possible]").click(); await wait(50);
    const possibleCard = doc.querySelector(".schedule-match-card.possible-event");
    assert(possibleCard && getComputedStyle(possibleCard).borderStyle === "dashed" && getComputedStyle(possibleCard).backgroundColor === "rgb(255, 255, 255)", "進出時のカードを白地の点線枠で表示");
    const mixedClassRow = [...doc.querySelectorAll(".schedule-time-row")].find((row) => row.querySelector(".possible-event") && row.querySelector(".schedule-match-card:not(.possible-event)"));
    const classCards = mixedClassRow ? [...mixedClassRow.querySelectorAll(".schedule-match-card")] : [];
    const firstPossibleIndex = classCards.findIndex((card) => card.classList.contains("possible-event"));
    assert(classCards.length && classCards.every((card) => !card.style.gridColumn) && classCards.slice(firstPossibleIndex).every((card) => card.classList.contains("possible-event")), "クラス予定を左寄せにし進出時を最後尾へ配置");

    frame.contentWindow.location.hash = "competition-schedule"; await wait(150);
    assert(doc.querySelector("h1").textContent === "競技別予定" && doc.querySelector("[data-competition-schedule-filter]"), "競技別予定画面へ遷移");
    assert(doc.querySelectorAll("[data-schedule-day-toggle]").length === 2 && [...doc.querySelectorAll("[data-schedule-day-toggle]")].every((button) => button.getAttribute("aria-expanded") === "false"), "競技別予定も日別に閉じて表示");
    doc.querySelector("[data-schedule-day-toggle]").click(); await wait(30);
    const multiCardRow = [...doc.querySelectorAll(".schedule-time-row")].find((row) => row.querySelectorAll(".schedule-match-card").length > 1);
    assert(multiCardRow && new Set([...multiCardRow.querySelectorAll(".schedule-match-card")].map((card) => card.style.gridColumn)).size > 1, "同時刻の試合を会場列ごとに横並び表示");
    const venueColumns = new Map();
    doc.querySelectorAll(".schedule-match-card").forEach((card) => {
      const venue = card.querySelector(".schedule-card-meta").textContent;
      if (!venueColumns.has(venue)) venueColumns.set(venue, new Set());
      venueColumns.get(venue).add(card.style.gridColumn);
    });
    assert([...venueColumns.values()].every((columns) => columns.size === 1), "同じ会場のカードを同じ列に配置");
    const completedCard = doc.querySelector(".schedule-match-card.completed");
    assert(completedCard && completedCard.querySelector(".schedule-card-winner") && getComputedStyle(completedCard).backgroundImage !== "none", "終了試合を赤い勝者名とグレー網掛けで表示");
    completedCard.click(); await wait(30);
    assert(doc.querySelector("#result-form"), "予定カードから結果入力画面を表示");
    doc.querySelector("[data-close-modal]").click();

    frame.contentWindow.location.hash = "class-schedule"; await wait(150);
    assert(doc.querySelector("[data-schedule-day-toggle]").getAttribute("aria-expanded") === "true" && doc.querySelector("[data-toggle-possible]").getAttribute("aria-pressed") === "true", "予定の開閉状態と進出時表示を再アクセス時に復元");
    const preparationLabel = [...doc.querySelectorAll("#sidebar nav p")].find((node) => node.textContent.includes("大会準備"));
    const scheduleLink = doc.querySelector('#sidebar [data-route="schedule"]');
    assert(Boolean(preparationLabel.compareDocumentPosition(scheduleLink) & Node.DOCUMENT_POSITION_FOLLOWING), "試合日程を大会準備の配下に表示");

    frame.contentWindow.location.hash = "competitions"; await wait(150);
    assert(doc.querySelectorAll(".competition-card").length === 4, "4競技の設定カードを表示");

    frame.contentWindow.location.hash = "entries"; await wait(150);
    assert(doc.querySelector(".badge.locked") && doc.querySelector(".locked-control"), "後続データ作成後のエントリーをロック表示");
    const lockedEntry = doc.querySelector("[data-entry-count]");
    const originalEntryCount = lockedEntry.value;
    let confirmCalls = 0;
    frame.contentWindow.confirm = () => { confirmCalls += 1; return false; };
    lockedEntry.value = originalEntryCount === "3" ? "2" : "3";
    lockedEntry.dispatchEvent(new Event("change", { bubbles: true })); await wait(50);
    const lockedState = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    assert(confirmCalls === 1 && lockedEntry.value === originalEntryCount && lockedState.draws[liveCompetition.id], "警告をキャンセルした場合は後続データを保持");
    frame.contentWindow.confirm = () => true;
    lockedEntry.value = originalEntryCount === "3" ? "2" : "3";
    lockedEntry.dispatchEvent(new Event("change", { bubbles: true })); await wait(100);
    const forcedState = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    assert(!forcedState.draws[liveCompetition.id] && !Object.keys(forcedState.schedule).some((id) => id.startsWith(`${liveCompetition.id}__`)) && !Object.keys(forcedState.results).some((id) => id.startsWith(`${liveCompetition.id}__`)), "警告承認後だけ後続データをリセットして変更");

    localStorage.setItem("indoor-matchboard-state-v2", JSON.stringify(lockedState));
    const drawReloaded = new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
    frame.src = "../index.html?draw-swap=1#draw";
    await drawReloaded; await wait(200); doc = frame.contentDocument;
    frame.contentWindow.confirm = () => true;
    const bracketSources = [...doc.querySelectorAll('.bracket-edit-team select[data-phase="tournament"]')].filter((select) => select.value.startsWith("team:"));
    const firstSource = bracketSources[0]; const secondSource = bracketSources.find((select) => select.value !== firstSource.value);
    const firstSourceValue = firstSource.value; const secondSourceValue = secondSource.value;
    firstSource.value = secondSourceValue;
    firstSource.dispatchEvent(new Event("change", { bubbles: true })); await wait(100);
    const swappedDrawState = JSON.parse(localStorage.getItem("indoor-matchboard-state-v2"));
    const swappedSlots = swappedDrawState.draws[liveCompetition.id].tournament.slots;
    assert(M.sourceKey(swappedSlots[Number(firstSource.dataset.slotIndex)]) === secondSourceValue && M.sourceKey(swappedSlots[Number(secondSource.dataset.slotIndex)]) === firstSourceValue, "設定済みチームを選ぶとトーナメント出場枠を入れ替え");

    const result = document.getElementById("results");
    result.className = failures ? "fail" : "pass";
    result.textContent = `${failures ? "FAILED" : "ALL PASSED"} (${output.length - failures}/${output.length})\n\n${output.join("\n")}`;
    document.body.dataset.failures = String(failures);
    document.title = failures ? "UI TESTS FAILED" : "UI TESTS PASSED";
  })();
</script>
